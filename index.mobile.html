<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover exposes safe-area insets; interactive-widget
         keeps the composer above the on-screen keyboard on Android and
         is harmless on iOS. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content, maximum-scale=1.0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Aethon</title>
    <!-- Fonts are self-hosted via @fontsource (src/styles/fonts.ts) —
         the phone frequently launches with no route to Google Fonts,
         and this stylesheet render-blocked first paint. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/mobile/mainMobile.tsx"></script>
  </body>
</html>
