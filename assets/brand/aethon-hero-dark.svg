<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 116" role="img" aria-label="Aethon — pi with a face">
  <title>Aethon — pi with a face</title>
  <defs>
    <symbol id="ae-cream" viewBox="0 0 88 100">
      <text x="0" y="80" font-size="100" fill="#fef3e2"
            font-family='"Bodoni 72", Didot, "Playfair Display", Georgia, "Times New Roman", serif'
            font-weight="700">Æ</text>
      <circle cx="73" cy="15" r="11" fill="#ff6a18" opacity="0.7"/>
      <text x="73" y="16" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#fef3e2"
            font-family='"Bodoni 72", Didot, "Playfair Display", Georgia, "Times New Roman", serif'
            font-style="italic">π</text>
    </symbol>
  </defs>

  <use href="#ae-cream" x="290" y="-2" width="60" height="68"/>
  <text x="350" y="53" font-size="68" fill="#fef3e2"
        font-family='"Bodoni 72", Didot, "Playfair Display", Georgia, "Times New Roman", serif'
        font-weight="700" letter-spacing="0.03em">thon</text>
  <line x1="260" y1="88" x2="500" y2="88" stroke="#ff6a18" stroke-width="1" opacity="0.4"/>
  <text x="380" y="110" text-anchor="middle" font-size="13" fill="#ff6a18" opacity="0.6"
        font-family='"Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif'
        letter-spacing="0.12em">PI WITH A FACE</text>
</svg>
