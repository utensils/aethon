<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Aethon brand — unified Æπ mark</title>

<defs>
  <!-- THE mark — one definition, used everywhere -->
  <symbol id="ae-cream" viewBox="0 0 88 100">
    <text class="serif" x="0" y="80" font-size="100" fill="#fef3e2">Æ</text>
    <circle cx="73" cy="15" r="11" fill="#ff6a18" opacity="0.7"/>
    <text class="serif-it" x="73" y="16" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#fef3e2">π</text>
  </symbol>
  <symbol id="ae-dark" viewBox="0 0 88 100">
    <text class="serif" x="0" y="80" font-size="100" fill="#1f1f23">Æ</text>
    <circle cx="73" cy="15" r="11" fill="#ff6a18" opacity="0.7"/>
    <text class="serif-it" x="73" y="16" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#fef3e2">π</text>
  </symbol>
  <!-- App icon tile — mark inside rounded rect -->
  <symbol id="app-icon" viewBox="0 0 60 60">
    <rect width="60" height="60" rx="14" fill="#2a2a2f"/>
    <use href="#ae-cream" x="4" y="4" width="48" height="54"/>
  </symbol>
  <symbol id="app-icon-solid" viewBox="0 0 60 60">
    <rect width="60" height="60" rx="14" fill="#1f1f23"/>
    <use href="#ae-cream" x="4" y="4" width="48" height="54"/>
  </symbol>
</defs>

