name: Docs

# Build the VitePress user guide on every PR / push to main; deploy to
# GitHub Pages on main only. The site lives under `website/` with its
# own bun lockfile so docs deps don't pollute the app's dependency tree.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
      # The nav version badge is read from package.json at build time, so a
      # release bump (release-please, release-type: node) must rebuild the
      # site even though it touches no website/** files — otherwise the badge
      # goes stale until the next docs edit.
      - "package.json"
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
      - "package.json"
  workflow_dispatch:

# Only one deploy to Pages at a time. Build runs on PR + main; deploy
# only fires on main. Cancel-in-progress is on the build group only —
# we don't want a fast PR follow-up to abort an in-flight Pages deploy.
concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Install dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: website
        run: bun run build

      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/.vitepress/dist

  deploy:
    name: deploy
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Don't cancel an in-flight deploy when a new PR-build runs.
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
