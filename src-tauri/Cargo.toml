[package]
name = "aethon"
version = "0.2.0"
edition = "2024"
license = "MIT"
description = "Pi with a face — agent-driven desktop shell with A2UI"
homepage = "https://github.com/utensils/aethon"
repository = "https://github.com/utensils/aethon"
authors = ["James Brink <brink.james@gmail.com>"]
keywords = ["tauri", "desktop", "agent", "a2ui", "ai"]
categories = ["gui"]

[lib]
name = "aethon_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "aethon"
path = "src/main.rs"

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
notify = "8"
uuid = { version = "1.23.1", features = ["v4"] }
tokio = { version = "1.52.1", features = ["net", "io-util", "time", "sync"] }
toml = { version = "0.8", features = ["parse"] }
tauri-plugin-process = "2.3.1"
tauri-plugin-opener = "2.5.3"
tauri-plugin-dialog = "2.7.0"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-updater = "2.10.1"
